<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Orbit ring -->
  <ellipse cx="32" cy="32" rx="28" ry="10" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.6" transform="rotate(-20 32 32)"/>
  <!-- Globe -->
  <circle cx="32" cy="32" r="14" fill="#0f3460" stroke="#4f9cf9" stroke-width="1.5"/>
  <!-- Continent hint -->
  <path d="M24 28 Q28 24 32 27 Q36 30 34 34 Q30 38 26 35 Z" fill="#00d4ff" opacity="0.25"/>
  <!-- Satellite body -->
  <rect x="44" y="18" width="8" height="5" rx="1" fill="#4f9cf9" stroke="#00d4ff" stroke-width="1"/>
  <!-- Solar panels -->
  <rect x="40" y="19.5" width="4" height="2" rx="0.5" fill="#f0a500" opacity="0.9"/>
  <rect x="52" y="19.5" width="4" height="2" rx="0.5" fill="#f0a500" opacity="0.9"/>
  <!-- Signal line from satellite to globe -->
  <line x1="44" y1="22" x2="38" y2="28" stroke="#00d4ff" stroke-width="0.8" stroke-dasharray="2 1.5" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="#00d4ff" opacity="0.9"/>
</svg>
