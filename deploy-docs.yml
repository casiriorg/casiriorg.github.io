name: Deploy CASIRI Docs to GitHub Pages

on:
  # Manual trigger from the Actions tab
  workflow_dispatch:
  # Also auto-deploy on push to main
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout casiriorg.github.io (this repo)
        uses: actions/checkout@v4

      - name: Clone qiskit-data-reuploading source (for API autodoc)
        run: |
          git clone --depth=1 https://github.com/Carlosandp/qiskit-data-reuploading.git \
            qiskit-data-reuploading-src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install MkDocs dependencies
        run: pip install -r requirements.txt

      - name: Install qdr package (so mkdocstrings can import it)
        run: |
          cd qiskit-data-reuploading-src
          pip install -e ".[dev]" || pip install -e . || true
          cd ..

      - name: Build MkDocs site
        run: mkdocs build --strict --verbose

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
