site_name: CASIRI
site_url: https://casiriorg.github.io
site_description: Corporation for Aerospace Initiatives, Research and Innovation
site_author: CASIRI
repo_url: https://github.com/casiriorg
repo_name: casiriorg

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Syne
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra_css:
  - assets/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/casiriorg

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [qiskit-data-reuploading-src]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Projects:
    - projects/index.md
    - QDR — Qiskit Data Reuploading:
      - docs/qiskit-data-reuploading/index.md
      - API Reference: docs/qiskit-data-reuploading/api.md
