site_name: CASIRI
site_url: https://casiriorg.github.io
site_description: Corporation for Aerospace Initiatives, Research and Innovation
site_author: CASIRI
repo_url: https://github.com/casiriorg
repo_name: casiriorg

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Cambiar a tema oscuro
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Cambiar a tema claro
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra_css:
  - assets/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/casiriorg

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [qiskit-data-reuploading-src]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Contexto: context.md
  - Proyectos:
    - projects/index.md
    - QDR — Qiskit Data Reuploading:
      - projects/qiskit-data-reuploading/index.md
      - API Reference: projects/qiskit-data-reuploading/api.md
  - Áreas:
    - areas/index.md
    - UAS/UAV para Vigilancia: areas/uas-observacion.md
    - Modelos Ligeros IA/ML: areas/modelos-ligeros.md
    - IA/ML para Decisiones: areas/ia-decisiones.md
    - Agricultura de Precisión: areas/agricultura-precision.md
    - Sensores Remotos: areas/sensores-remotos.md
    - Aplicaciones Civiles: areas/aplicaciones-civiles.md
